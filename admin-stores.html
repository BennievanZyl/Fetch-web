<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetch Admin — Stores</title>
<link rel="stylesheet" href="/admin-shared.css?v=3">
<script>const SUPABASE_URL = 'https://errbnpeswpjmdsvehduz.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycmJucGVzd3BqbWRzdmVoZHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNDgzMDMsImV4cCI6MjA4NjgyNDMwM30.ZYeZUV6PFs_yATPMUisH9vzXwWaMpBUwEn6Dsy6F0z8';

function getToken() { return localStorage.getItem('fetch_admin_token'); }
function authHeaders() {
  return { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${getToken() || SUPABASE_KEY}` };
}
function guardAdmin() { if (!getToken()) { window.location.href = '/admin'; return false; } return true; }
function signOut() { localStorage.removeItem('fetch_admin_token'); localStorage.removeItem('fetch_admin_user'); window.location.href = '/admin'; }

async function sbGet(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, { headers: authHeaders() });
  return res.json();
}
async function sbPost(table, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, { method: 'POST', headers: { ...authHeaders(), 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  return res.json();
}
async function sbPatch(table, id, body) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'PATCH', headers: { ...authHeaders(), 'Prefer': 'return=representation' }, body: JSON.stringify(body) });
  return res.json();
}
async function sbDelete(table, id) { await fetch(`${SUPABASE_URL}/rest/v1/${table}?id=eq.${id}`, { method: 'DELETE', headers: authHeaders() }); }

function generateCode() { return 'FETCH-' + Math.random().toString(36).substring(2, 8).toUpperCase(); }
function formatZAR(amount) { return 'R' + parseFloat(amount || 0).toFixed(2); }
function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}
function formatDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('en-ZA', { day: 'numeric', month: 'short', year: 'numeric' });
}
function statusPill(status) {
  const map = { pending:['#FFF8E6','#9A6500'], confirmed:['#E6F0FB','#1A5FA5'], preparing:['#FFF8E6','#9A6500'], ready:['#F3E6FB','#6B21A8'], picked_up:['#E6F9F0','#0A7A45'], delivered:['#E6F9F0','#0A7A45'], cancelled:['#FDECEA','#B91C1C'], active:['#E6F9F0','#0A7A45'], onboarding:['#F7F7F7','#8E8E8E'], paused:['#FFF8E6','#9A6500'], suspended:['#FDECEA','#B91C1C'], approved:['#E6F9F0','#0A7A45'], rejected:['#FDECEA','#B91C1C'], driver:['#E6F9F0','#0A7A45'], suspended_driver:['#FDECEA','#B91C1C'] };
  const [bg, color] = map[status] || ['#F7F7F7','#8E8E8E'];
  const label = status.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  return `<span style="background:${bg};color:${color};padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap">${label}</span>`;
}
function buildSidebar(activePage) {
  const pages = [
    { id:'dashboard', icon:'📊', label:'Dashboard',    href:'/admin/dashboard' },
    { id:'enquiries', icon:'📋', label:'Enquiries',    href:'/admin/enquiries' },
    { id:'stores',    icon:'🏪', label:'Stores',       href:'/admin/stores' },
    { id:'codes',     icon:'🎟️', label:'Invite Codes', href:'/admin/codes' },
    { id:'orders',    icon:'🛒', label:'Orders',       href:'/admin/orders' },
    { id:'drivers',   icon:'🚗', label:'Drivers',      href:'/admin/drivers' },
  ];
  const items = pages.map(p => `<a href="${p.href}" class="sidebar-item ${p.id===activePage?'active':''}"><span>${p.icon}</span><span>${p.label}</span></a>`).join('');
  return `<aside class="sidebar"><div class="sidebar-logo">FETCH<span>.</span></div><div class="sidebar-badge">Admin</div><nav class="sidebar-nav">${items}</nav><button class="sidebar-signout" onclick="signOut()">Sign Out</button></aside>`;
}
function showModal(html) {
  const overlay = document.createElement('div');
  overlay.id = 'modal-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px;overflow-y:auto';
  overlay.innerHTML = `<div style="background:#fff;border-radius:20px;padding:40px;max-width:520px;width:100%;position:relative">${html}<button onclick="closeModal()" style="position:absolute;top:16px;right:16px;background:#f7f7f7;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px">✕</button></div>`;
  overlay.addEventListener('click', e => { if(e.target===overlay) closeModal(); });
  document.body.appendChild(overlay);
}
function closeModal() { const el = document.getElementById('modal-overlay'); if(el) el.remove(); }
function copyToClipboard(text, btn) {
  navigator.clipboard.writeText(text).then(() => { const o=btn.textContent; btn.textContent='Copied! ✓'; btn.style.background='#06C167'; btn.style.color='#fff'; setTimeout(()=>{btn.textContent=o;btn.style.background='';btn.style.color='';},2000); });
}
function whatsappLink(phone, code, ownerName, storeName) {
  const num = (phone||'').replace(/\D/g,'').replace(/^0/,'27');
  const msg = encodeURIComponent(`Hi ${ownerName}! 👋 Welcome to Fetch 🎉\n\nYour store *${storeName}* has been approved!\n\nDownload the Fetch app and enter your Partner Code:\n\n*${code}*\n\nYour code expires in 30 days. Reply if you need help!`);
  return `https://wa.me/${num}?text=${msg}`;
}
</script>
</head>
<body>
<div id="sidebar-wrap"></div>
<div class="main">
  <div class="topbar">
    <h1>Stores <span id="store-count" class="badge" style="display:none"></span></h1>
    <div class="topbar-right">
      <input type="text" class="search-input" placeholder="Search stores..." oninput="filterStores(this.value)">
    </div>
  </div>
  <div class="content">
    <div class="stats-grid" style="margin-bottom:24px">
      <div class="stat-card"><div class="stat-label">Total Stores</div><div class="stat-num" id="s-total">—</div></div>
      <div class="stat-card"><div class="stat-label" style="color:#06C167">Live</div><div class="stat-num" id="s-live" style="color:#06C167">—</div></div>
      <div class="stat-card"><div class="stat-label" style="color:#F39C12">Onboarding</div><div class="stat-num" id="s-onboard" style="color:#F39C12">—</div></div>
      <div class="stat-card"><div class="stat-label" style="color:#E74C3C">Paused/Suspended</div><div class="stat-num" id="s-paused" style="color:#E74C3C">—</div></div>
    </div>
    <div class="table-card">
      <table>
        <thead><tr><th>Store Name</th><th>Address</th><th>Status</th><th>Delivery Fee</th><th>Created</th><th>Actions</th></tr></thead>
        <tbody id="stores-tbody"><tr><td colspan="6" style="text-align:center;padding:40px;color:#8E8E8E">Loading...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>
<script>
  guardAdmin();
  document.getElementById('sidebar-wrap').innerHTML = buildSidebar('stores');
  let allStores = [];

  async function loadStores() {
    allStores = await sbGet('stores', '?order=created_at.desc&select=*');
    if (!Array.isArray(allStores)) allStores = [];
    const count = document.getElementById('store-count');
    count.textContent = allStores.length; count.style.display = 'inline-flex';
    document.getElementById('s-total').textContent = allStores.length;
    document.getElementById('s-live').textContent = allStores.filter(s=>s.status==='active').length;
    document.getElementById('s-onboard').textContent = allStores.filter(s=>s.status==='onboarding').length;
    document.getElementById('s-paused').textContent = allStores.filter(s=>s.status==='paused'||s.status==='suspended').length;
    renderStores(allStores);
  }

  function filterStores(q) {
    renderStores(allStores.filter(s => (s.name||'').toLowerCase().includes(q.toLowerCase()) || (s.address||'').toLowerCase().includes(q.toLowerCase())));
  }

  function renderStores(data) {
    const tbody = document.getElementById('stores-tbody');
    if (!data.length) { tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:48px;color:#8E8E8E"><div style="font-size:32px;margin-bottom:12px">🏪</div>No stores found</td></tr>`; return; }
    tbody.innerHTML = data.map(s => `<tr>
      <td><strong>${s.name}</strong>${s.description?`<div style="font-size:12px;color:#8E8E8E;margin-top:2px">${s.description.slice(0,60)}...</div>`:''}</td>
      <td class="td-muted">${s.address||'—'}</td>
      <td>${statusPill(s.status||'onboarding')}</td>
      <td>${s.delivery_fee==0?'<span style="color:#06C167;font-weight:700">Free</span>':formatZAR(s.delivery_fee)}</td>
      <td class="td-muted">${formatDate(s.created_at)}</td>
      <td>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          ${s.status!=='active'?`<button class="btn btn-green btn-sm" onclick="activateStore('${s.id}')">▶ Activate</button>`:''}
          ${s.status==='active'?`<button class="btn btn-grey btn-sm" onclick="pauseStore('${s.id}')">⏸ Pause</button>`:''}
          ${s.status!=='suspended'?`<button class="btn btn-red btn-sm" onclick="suspendStore('${s.id}','${s.name}')">🚫 Suspend</button>`:''}
          ${s.status==='suspended'?`<button class="btn btn-green btn-sm" onclick="activateStore('${s.id}')">↩ Reinstate</button>`:''}
          <button class="btn btn-grey btn-sm" onclick="viewProducts('${s.id}','${s.name}')">🍽️ Menu</button>
        </div>
      </td>
    </tr>`).join('');
  }

  async function activateStore(id) { await sbPatch('stores', id, { is_active: true, status: 'active', activated_at: new Date().toISOString() }); loadStores(); }
  async function pauseStore(id) { await sbPatch('stores', id, { is_active: false, status: 'paused', paused_at: new Date().toISOString() }); loadStores(); }
  async function suspendStore(id, name) {
    if (!confirm(`Suspend ${name}?`)) return;
    await sbPatch('stores', id, { is_active: false, status: 'suspended', suspended_at: new Date().toISOString() }); loadStores();
  }
  async function viewProducts(storeId, storeName) {
    const products = await sbGet('products', `?store_id=eq.${storeId}&order=category,name`);
    const rows = Array.isArray(products) && products.length
      ? products.map(p => `<tr><td><strong>${p.name}</strong></td><td class="td-muted">${p.category||'General'}</td><td><strong>${formatZAR(p.price)}</strong></td><td>${p.is_available?'<span style="color:#06C167;font-weight:700">✓</span>':'<span style="color:#E74C3C">✗</span>'}</td></tr>`).join('')
      : '<tr><td colspan="4" style="text-align:center;padding:24px;color:#8E8E8E">No products yet</td></tr>';
    showModal(`
      <div class="modal-title">🍽️ ${storeName}</div>
      <div class="modal-sub">${Array.isArray(products)?products.length:0} products</div>
      <div style="overflow-y:auto;max-height:400px">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr style="background:#F7F7F7"><th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#8E8E8E;text-transform:uppercase">Name</th><th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#8E8E8E;text-transform:uppercase">Category</th><th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#8E8E8E;text-transform:uppercase">Price</th><th style="padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#8E8E8E;text-transform:uppercase">Available</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `);
  }
  loadStores();
</script>
</body>
</html>

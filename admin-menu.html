<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fetch Admin — Menu Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--green:#06C167;--black:#000;--white:#fff;--surface:#F7F7F7;--border:#E8E8E8;--muted:#8E8E8E;--danger:#E74C3C;--warning:#F39C12;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--black);display:flex;min-height:100vh;}
.sidebar{width:240px;min-height:100vh;background:var(--black);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:50;}
.sidebar-logo{font-family:'Syne',sans-serif;font-weight:900;font-size:22px;letter-spacing:-1px;color:var(--white);padding:28px 24px 4px;}
.sidebar-logo span{color:var(--green);}
.sidebar-badge{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:1px;padding:0 24px 24px;}
.sidebar-nav{flex:1;display:flex;flex-direction:column;gap:2px;padding:8px 12px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;font-size:14px;font-weight:500;color:rgba(255,255,255,0.6);text-decoration:none;transition:all 0.2s;}
.sidebar-item:hover{background:rgba(255,255,255,0.08);color:var(--white);}
.sidebar-item.active{background:rgba(6,193,103,0.15);color:var(--green);font-weight:700;}
.sidebar-signout{margin:16px 12px;padding:12px;border-radius:10px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.2);color:var(--danger);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.main{margin-left:240px;flex:1;display:flex;flex-direction:column;}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:20px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40;}
.topbar h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:900;}
.content{padding:32px;display:grid;grid-template-columns:300px 1fr;gap:24px;align-items:start;}
.panel{background:var(--white);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:800;}
.store-item{padding:14px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;display:flex;align-items:center;justify-content:space-between;}
.store-item:last-child{border-bottom:none;}
.store-item:hover{background:#fafafa;}
.store-item.selected{background:rgba(6,193,103,0.06);border-left:3px solid var(--green);}
.store-name{font-weight:700;font-size:14px;}
.store-sub{font-size:12px;color:var(--muted);margin-top:2px;}
.btn{padding:8px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;text-decoration:none;}
.btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;}
.btn-xs{padding:4px 10px;font-size:11px;border-radius:6px;}
.btn-green{background:var(--green);color:var(--white);}
.btn-black{background:var(--black);color:var(--white);}
.btn-red{background:rgba(231,76,60,0.1);color:var(--danger);border:1px solid rgba(231,76,60,0.2);}
.btn-grey{background:var(--surface);color:var(--black);border:1px solid var(--border);}
.right-panel{display:flex;flex-direction:column;gap:16px;}
.category-header{background:var(--white);border-radius:16px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);display:flex;align-items:center;gap:12px;}
.cat-select{flex:1;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--black);background:var(--white);outline:none;}
.cat-select:focus{border-color:var(--green);}
.product-card{background:var(--white);border-radius:16px;box-shadow:0 1px 4px rgba(0,0,0,0.06);overflow:hidden;margin-bottom:12px;}
.product-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;cursor:pointer;}
.product-name{font-weight:700;font-size:15px;}
.product-meta{font-size:12px;color:var(--muted);margin-top:3px;}
.product-price{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--green);white-space:nowrap;}
.product-body{padding:16px 20px;}
.product-body.hidden{display:none;}
.section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px;}
.option-group-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border);}
.option-group-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.option-group-name{font-weight:700;font-size:14px;}
.option-group-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.option-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.option-row:last-child{border-bottom:none;}
.option-name{flex:1;font-size:13px;}
.option-price{font-size:13px;color:var(--green);font-weight:600;white-space:nowrap;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;}
.badge-required{background:rgba(231,76,60,0.1);color:var(--danger);}
.badge-optional{background:var(--surface);color:var(--muted);border:1px solid var(--border);}
.badge-single{background:rgba(6,193,103,0.1);color:#0a7a45;}
.badge-multi{background:rgba(26,95,165,0.1);color:#1a5fa5;}
input[type=text],input[type=number],textarea,select{font-family:'DM Sans',sans-serif;font-size:14px;color:var(--black);background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:10px 14px;outline:none;width:100%;transition:border-color 0.2s;}
input:focus,textarea:focus,select:focus{border-color:var(--green);}
.form-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;}
.form-label{font-size:12px;font-weight:700;color:var(--black);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;display:block;}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;}
.toggle-label{font-size:14px;font-weight:500;}
.toggle{position:relative;width:44px;height:24px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#ddd;border-radius:999px;transition:0.3s;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:white;border-radius:50%;transition:0.3s;}
.toggle input:checked+.toggle-slider{background:var(--green);}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.chip{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:600;border:1.5px solid var(--border);background:var(--white);cursor:pointer;color:var(--muted);transition:all 0.2s;}
.chip.selected{background:var(--black);color:var(--white);border-color:var(--black);}
.divider{height:1px;background:var(--border);margin:16px 0;}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;display:none;align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;padding:36px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;}
.modal-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:900;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.option-edit-row{display:grid;grid-template-columns:1fr 100px 36px;gap:8px;align-items:center;margin-bottom:8px;}
.delete-btn{width:36px;height:36px;border-radius:8px;background:rgba(231,76,60,0.1);border:none;color:var(--danger);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.avail-toggle{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.success-toast{position:fixed;bottom:24px;right:24px;background:var(--black);color:var(--white);padding:14px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;display:none;align-items:center;gap:8px;}
.success-toast.show{display:flex;}
@media(max-width:900px){.sidebar{display:none;}.main{margin-left:0;}.content{grid-template-columns:1fr;}.topbar{padding:16px;}.content{padding:16px;}}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">FETCH<span>.</span></div>
  <div class="sidebar-badge">Admin</div>
  <nav class="sidebar-nav">
    <a href="/admin/dashboard" class="sidebar-item"><span>📊</span><span>Dashboard</span></a>
    <a href="/admin/enquiries" class="sidebar-item"><span>📋</span><span>Enquiries</span></a>
    <a href="/admin/stores" class="sidebar-item"><span>🏪</span><span>Stores</span></a>
    <a href="/admin/codes" class="sidebar-item"><span>🎟️</span><span>Invite Codes</span></a>
    <a href="/admin/orders" class="sidebar-item"><span>🛒</span><span>Orders</span></a>
    <a href="/admin/drivers" class="sidebar-item"><span>🚗</span><span>Drivers</span></a>
    <a href="/admin/menu" class="sidebar-item active"><span>🍽️</span><span>Menu Builder</span></a>
  </nav>
  <button class="sidebar-signout" onclick="signOut()">Sign Out</button>
</aside>

<div class="main">
  <div class="topbar">
    <h1>Menu Builder</h1>
    <div style="display:flex;gap:10px;align-items:center">
      <span id="save-status" style="font-size:13px;color:var(--muted)"></span>
      <button class="btn btn-green" onclick="openAddProduct()">+ Add Product</button>
    </div>
  </div>

  <div class="content">
    <!-- Left: Store selector -->
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Stores</div>
      </div>
      <div id="stores-list">
        <div class="empty-state"><div class="empty-icon">🏪</div><p>Loading stores...</p></div>
      </div>
    </div>

    <!-- Right: Menu -->
    <div class="right-panel">
      <div id="menu-area">
        <div class="panel">
          <div class="empty-state"><div class="empty-icon">👈</div><p>Select a store to manage its menu</p></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box" id="modal-box"></div>
</div>

<div class="success-toast" id="toast">✓ <span id="toast-msg">Saved</span></div>

<script>
const SB = 'https://errbnpeswpjmdsvehduz.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVycmJucGVzd3BqbWRzdmVoZHV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEyNDgzMDMsImV4cCI6MjA4NjgyNDMwM30.ZYeZUV6PFs_yATPMUisH9vzXwWaMpBUwEn6Dsy6F0z8';

function tok(){return localStorage.getItem('fetch_admin_token');}
function signOut(){localStorage.removeItem('fetch_admin_token');window.location.href='/admin';}
if(!tok())window.location.href='/admin';

function hdrs(extra){return{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+(tok()||KEY),...(extra||{})};}

async function get(table,q){const r=await fetch(SB+'/rest/v1/'+table+(q||''),{headers:hdrs()});return r.json();}
async function post(table,body){const r=await fetch(SB+'/rest/v1/'+table,{method:'POST',headers:hdrs({'Prefer':'return=representation'}),body:JSON.stringify(body)});return r.json();}
async function patch(table,id,body){const r=await fetch(SB+'/rest/v1/'+table+'?id=eq.'+id,{method:'PATCH',headers:hdrs({'Prefer':'return=representation'}),body:JSON.stringify(body)});return r.json();}
async function del(table,id){await fetch(SB+'/rest/v1/'+table+'?id=eq.'+id,{method:'DELETE',headers:hdrs()});}

function toast(msg){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function showModal(html){document.getElementById('modal-box').innerHTML=html;document.getElementById('modal').classList.add('open');}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function fmtZAR(n){return'R'+parseFloat(n||0).toFixed(2);}
function fmtDate(d){return d?new Date(d).toLocaleDateString('en-ZA',{day:'numeric',month:'short'}):'—';}

let selectedStore=null;

async function loadStores(){
  const stores=await get('stores','?order=name&select=*');
  const el=document.getElementById('stores-list');
  if(!Array.isArray(stores)||!stores.length){el.innerHTML='<div class="empty-state"><div class="empty-icon">🏪</div><p>No stores found</p></div>';return;}
  el.innerHTML=stores.map(s=>`
    <div class="store-item ${selectedStore?.id===s.id?'selected':''}" onclick="selectStore(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <div>
        <div class="store-name">${s.name}</div>
        <div class="store-sub">${s.address||'No address'}</div>
      </div>
      <span style="font-size:11px;font-weight:700;color:${s.status==='active'?'#0a7a45':'#8E8E8E'}">${s.status}</span>
    </div>`).join('');
}

async function selectStore(store){
  selectedStore=store;
  loadStores();
  loadMenu();
}

async function loadMenu(){
  if(!selectedStore){return;}
  const area=document.getElementById('menu-area');
  area.innerHTML='<div style="text-align:center;padding:40px;color:#8E8E8E">Loading menu...</div>';

  const products=await get('products','?store_id=eq.'+selectedStore.id+'&order=category,name&select=*');

  if(!Array.isArray(products)||!products.length){
    area.innerHTML=`
      <div class="panel">
        <div class="empty-state">
          <div class="empty-icon">🍽️</div>
          <p style="font-weight:700;margin-bottom:8px">No products yet</p>
          <p style="margin-bottom:16px">Add your first menu item to get started</p>
          <button class="btn btn-green" onclick="openAddProduct()">+ Add First Product</button>
        </div>
      </div>`;
    return;
  }

  const categories=[...new Set(products.map(p=>p.category||'General'))];
  let html='';

  for(const cat of categories){
    const catProducts=products.filter(p=>(p.category||'General')===cat);
    html+=`<div style="margin-bottom:8px;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#8E8E8E;text-transform:uppercase;letter-spacing:0.8px">${cat} (${catProducts.length})</div>`;
    for(const p of catProducts){
      const groups=await get('product_option_groups','?product_id=eq.'+p.id+'&order=sort_order&select=*,options:product_options(*)');
      html+=buildProductCard(p,Array.isArray(groups)?groups:[]);
    }
  }
  area.innerHTML=html;
}

function buildProductCard(p,groups){
  const groupsHtml=groups.length?groups.map(g=>`
    <div class="option-group-card">
      <div class="option-group-top">
        <div>
          <div class="option-group-name">${g.name}</div>
          <div class="option-group-meta">
            <span class="badge ${g.is_required?'badge-required':'badge-optional'}">${g.is_required?'Required':'Optional'}</span>
            <span class="badge ${g.max_selections===1?'badge-single':'badge-multi'}" style="margin-left:4px">${g.max_selections===1?'Single choice':'Multiple choice'}</span>
          </div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-grey btn-xs" onclick="editGroup('${g.id}','${p.id}')">✏️ Edit</button>
          <button class="btn btn-red btn-xs" onclick="deleteGroup('${g.id}')">Delete</button>
        </div>
      </div>
      ${Array.isArray(g.options)&&g.options.length?g.options.map(o=>`
        <div class="option-row">
          <span class="option-name">${o.name}</span>
          <span class="option-price">${o.price_modifier>0?'+'+fmtZAR(o.price_modifier):'Included'}</span>
          <span style="font-size:11px;color:${o.is_available?'#0a7a45':'#E74C3C'};margin-left:8px">${o.is_available?'✓':'✗'}</span>
        </div>`).join(''):'<div style="font-size:13px;color:#8E8E8E;padding:4px 0">No options added yet</div>'}
    </div>`).join(''):'<div style="font-size:13px;color:#8E8E8E;padding:4px 0">No customisation options</div>';

  return`
    <div class="product-card">
      <div class="product-header" onclick="toggleProduct('prod-${p.id}')">
        <div style="flex:1">
          <div class="product-name">${p.name} ${p.is_featured?'⭐':''}</div>
          <div class="product-meta">${p.category||'General'} · ${p.prep_time_minutes||15}min prep · ${p.is_available?'<span style="color:#0a7a45">Available</span>':'<span style="color:#E74C3C">Unavailable</span>'}</div>
          ${p.description?`<div style="font-size:12px;color:#8E8E8E;margin-top:3px">${p.description.slice(0,80)}${p.description.length>80?'...':''}</div>`:''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="product-price">${fmtZAR(p.price)}</div>
          <div style="display:flex;gap:4px">
            <button class="btn btn-grey btn-xs" onclick="event.stopPropagation();editProduct(${JSON.stringify(p).replace(/"/g,'&quot;')})">✏️</button>
            <button class="btn btn-red btn-xs" onclick="event.stopPropagation();deleteProduct('${p.id}','${p.name}')">🗑️</button>
          </div>
        </div>
      </div>
      <div class="product-body hidden" id="prod-${p.id}">
        <div class="section-label">Customisation Options</div>
        ${groupsHtml}
        <button class="btn btn-green btn-sm" style="margin-top:10px" onclick="openAddGroup('${p.id}')">+ Add Option Group</button>
      </div>
    </div>`;
}

function toggleProduct(id){
  const el=document.getElementById(id);
  if(el)el.classList.toggle('hidden');
}

function openAddProduct(){
  if(!selectedStore){alert('Please select a store first.');return;}
  showModal(`
    <div class="modal-title">Add Product</div>
    <div class="modal-sub">Add a new item to ${selectedStore.name}</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="form-label">Product Name *</label><input type="text" id="p-name" placeholder="e.g. Classic Cheese Burger"></div>
      <div><label class="form-label">Description</label><textarea id="p-desc" rows="2" placeholder="Brief description..."></textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label class="form-label">Price (ZAR) *</label><input type="number" id="p-price" placeholder="0.00" step="0.01"></div>
        <div><label class="form-label">Category</label><input type="text" id="p-cat" placeholder="e.g. Burgers"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label class="form-label">Prep Time (min)</label><input type="number" id="p-prep" value="15"></div>
        <div><label class="form-label">Image URL</label><input type="text" id="p-img" placeholder="https://..."></div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Available for order</span>
        <label class="toggle"><input type="checkbox" id="p-avail" checked><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Mark as Popular ⭐</span>
        <label class="toggle"><input type="checkbox" id="p-feat"><span class="toggle-slider"></span></label>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-grey" style="flex:1" onclick="closeModal()">Cancel</button>
        <button class="btn btn-black" style="flex:2;padding:14px" onclick="saveProduct(null)">Save Product</button>
      </div>
    </div>
  `);
}

function editProduct(p){
  showModal(`
    <div class="modal-title">Edit Product</div>
    <div class="modal-sub">${p.name}</div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div><label class="form-label">Product Name *</label><input type="text" id="p-name" value="${p.name}"></div>
      <div><label class="form-label">Description</label><textarea id="p-desc" rows="2">${p.description||''}</textarea></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label class="form-label">Price (ZAR) *</label><input type="number" id="p-price" value="${p.price}" step="0.01"></div>
        <div><label class="form-label">Category</label><input type="text" id="p-cat" value="${p.category||''}"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><label class="form-label">Prep Time (min)</label><input type="number" id="p-prep" value="${p.prep_time_minutes||15}"></div>
        <div><label class="form-label">Image URL</label><input type="text" id="p-img" value="${p.image_url||''}"></div>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Available for order</span>
        <label class="toggle"><input type="checkbox" id="p-avail" ${p.is_available?'checked':''}><span class="toggle-slider"></span></label>
      </div>
      <div class="toggle-row">
        <span class="toggle-label">Mark as Popular ⭐</span>
        <label class="toggle"><input type="checkbox" id="p-feat" ${p.is_featured?'checked':''}><span class="toggle-slider"></span></label>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-grey" style="flex:1" onclick="closeModal()">Cancel</button>
        <button class="btn btn-black" style="flex:2;padding:14px" onclick="saveProduct('${p.id}')">Update Product</button>
      </div>
    </div>
  `);
}

async function saveProduct(existingId){
  const name=document.getElementById('p-name').value.trim();
  const price=parseFloat(document.getElementById('p-price').value)||0;
  if(!name||!price){alert('Please enter a name and price.');return;}
  const body={
    store_id:selectedStore.id,
    name,
    description:document.getElementById('p-desc').value||null,
    price,
    category:document.getElementById('p-cat').value||'General',
    prep_time_minutes:parseInt(document.getElementById('p-prep').value)||15,
    image_url:document.getElementById('p-img').value||null,
    is_available:document.getElementById('p-avail').checked,
    is_featured:document.getElementById('p-feat').checked,
  };
  if(existingId){await patch('products',existingId,body);}
  else{await post('products',body);}
  closeModal();
  toast(existingId?'Product updated!':'Product added!');
  loadMenu();
}

async function deleteProduct(id,name){
  if(!confirm('Delete "'+name+'"? This cannot be undone.'))return;
  await del('products',id);
  toast('Product deleted');
  loadMenu();
}

let editingGroupProductId=null;
let editingGroupId=null;
let optionRows=[];

function openAddGroup(productId){
  editingGroupProductId=productId;
  editingGroupId=null;
  optionRows=[{name:'',price:0}];
  renderGroupModal(null);
}

async function editGroup(groupId,productId){
  editingGroupProductId=productId;
  editingGroupId=groupId;
  const groups=await get('product_option_groups','?id=eq.'+groupId+'&select=*,options:product_options(*)');
  const g=Array.isArray(groups)&&groups[0]?groups[0]:null;
  if(!g){alert('Group not found');return;}
  optionRows=(g.options||[]).map(o=>({id:o.id,name:o.name,price:o.price_modifier,available:o.is_available}));
  if(!optionRows.length)optionRows=[{name:'',price:0}];
  renderGroupModal(g);
}

function renderGroupModal(g){
  showModal(`
    <div class="modal-title">${g?'Edit':'Add'} Option Group</div>
    <div class="modal-sub">e.g. "Choose your spice level", "Add extras"</div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div><label class="form-label">Group Name *</label><input type="text" id="g-name" value="${g?g.name:''}" placeholder="e.g. Choose your spice level"></div>
      <div><label class="form-label">Description (optional)</label><input type="text" id="g-desc" value="${g?g.description||'':''}" placeholder="e.g. How hot would you like it?"></div>
      <div>
        <label class="form-label">Selection Type</label>
        <div class="chip-row">
          <div class="chip ${(!g||g.max_selections===1)?'selected':''}" id="chip-single" onclick="setSelType(1)">Single choice</div>
          <div class="chip ${g&&g.max_selections>1?'selected':''}" id="chip-multi" onclick="setSelType(10)">Multiple choice</div>
        </div>
        <input type="hidden" id="g-maxsel" value="${g?g.max_selections:1}">
      </div>
      <div class="toggle-row" style="background:#F7F7F7;border-radius:10px;padding:12px 14px">
        <div>
          <div class="toggle-label">Required</div>
          <div style="font-size:12px;color:#8E8E8E;margin-top:2px">Customer must select before adding to cart</div>
        </div>
        <label class="toggle"><input type="checkbox" id="g-required" ${g&&g.is_required?'checked':''}><span class="toggle-slider"></span></label>
      </div>
      <div>
        <label class="form-label">Options</label>
        <div id="options-list"></div>
        <button class="btn btn-grey btn-sm" style="margin-top:8px" onclick="addOptionRow()">+ Add Option</button>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-grey" style="flex:1" onclick="closeModal()">Cancel</button>
        <button class="btn btn-black" style="flex:2;padding:14px" onclick="saveGroup()">Save Group</button>
      </div>
    </div>
  `);
  renderOptionRows();
}

function setSelType(val){
  document.getElementById('g-maxsel').value=val;
  document.getElementById('chip-single').classList.toggle('selected',val===1);
  document.getElementById('chip-multi').classList.toggle('selected',val>1);
}

function renderOptionRows(){
  const el=document.getElementById('options-list');
  if(!el)return;
  el.innerHTML=optionRows.map((o,i)=>`
    <div class="option-edit-row">
      <input type="text" value="${o.name}" placeholder="Option name (e.g. Mild)" oninput="optionRows[${i}].name=this.value">
      <input type="number" value="${o.price}" placeholder="0.00" step="0.01" style="text-align:right" oninput="optionRows[${i}].price=parseFloat(this.value)||0">
      <button class="delete-btn" onclick="removeOptionRow(${i})">×</button>
    </div>`).join('');
}

function addOptionRow(){optionRows.push({name:'',price:0});renderOptionRows();}
function removeOptionRow(i){if(optionRows.length>1){optionRows.splice(i,1);renderOptionRows();}}

async function saveGroup(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){alert('Please enter a group name.');return;}
  const validOptions=optionRows.filter(o=>o.name.trim());
  if(!validOptions.length){alert('Please add at least one option.');return;}

  const groupBody={
    product_id:editingGroupProductId,
    name,
    description:document.getElementById('g-desc').value||null,
    is_required:document.getElementById('g-required').checked,
    max_selections:parseInt(document.getElementById('g-maxsel').value)||1,
    min_selections:document.getElementById('g-required').checked?1:0,
  };

  let groupId=editingGroupId;
  if(groupId){
    await patch('product_option_groups',groupId,groupBody);
    await fetch(SB+'/rest/v1/product_options?group_id=eq.'+groupId,{method:'DELETE',headers:hdrs()});
  } else {
    const res=await post('product_option_groups',groupBody);
    const newGroup=Array.isArray(res)?res[0]:res;
    if(!newGroup||!newGroup.id){alert('Failed to create group');return;}
    groupId=newGroup.id;
  }

  for(let i=0;i<validOptions.length;i++){
    const o=validOptions[i];
    await post('product_options',{
      group_id:groupId,
      name:o.name.trim(),
      price_modifier:parseFloat(o.price)||0,
      is_available:true,
      sort_order:i,
    });
  }

  closeModal();
  toast(editingGroupId?'Option group updated!':'Option group added!');
  loadMenu();
}

async function deleteGroup(groupId){
  if(!confirm('Delete this option group and all its options?'))return;
  await del('product_option_groups',groupId);
  toast('Option group deleted');
  loadMenu();
}

loadStores();
</script>
</body>
</html>
